                              - paragraph [ref=f569e116]:
                                - strong [ref=f569e118]: Smarter Drain Protection
                              - paragraph [ref=f569e119]:
                                - generic [ref=f569e120]: TubShroom fits any standard shower bathtub drain with a snug fit. The unique mushroom-like shape allows for maximum water flow so you can keep on showering. Hair collects neatly inside the drain around the bottom lip--completely out of sight--until you're ready to clean it off. A drain that has TubShroom in place can go weeks without having to be cleaned.
                              - paragraph [ref=f569e121]
                              - paragraph [ref=f569e122]:
                                - strong [ref=f569e123]:
                                  - generic [ref=f569e124]: The Last Hair Catcher You'll Ever Need
                              - paragraph [ref=f569e125]:
                                - generic [ref=f569e126]: Your TubShroom was built with long-lasting, industrial-strength silicone so it doesn't need to be replaced for at least 10 years. Say good-bye to harmful cleaners, pricey plumbers, and clogged drains forever. Get back to enjoying your showers in peace.
                              - paragraph [ref=f569e127]
                              - paragraph [ref=f569e128]:
                                - strong [ref=f569e129]:
                                  - generic [ref=f569e130]: Simple Installation
                              - paragraph [ref=f569e131]:
                                - generic [ref=f569e132]: TubShroom is so easy to use that all you really need to do is place it inside your shower tub drain. If your drain has a cover, it can usually be removed with a screwdriver in seconds. You can check the unit every other week to see how much hair has gathered.
                              - paragraph [ref=f569e133]
                              - paragraph [ref=f569e134]:
                                - strong [ref=f569e135]:
                                  - generic [ref=f569e136]: Easy to Clean
                              - paragraph [ref=f569e137]:
                                - generic [ref=f569e138]: When it's time to clean your TubShroom, simply lift it out of the drain with one hand and clean off the gathered hair with a paper towel. You'll notice the hair comes off in one swipe, neatly and cleanly. Hair has never been so cooperative
                              - paragraph [ref=f569e139]
                              - paragraph [ref=f569e140]:
                                - strong [ref=f569e141]:
                                  - generic [ref=f569e142]: A Better Hair Trap
                              - paragraph [ref=f569e143]:
                                - generic [ref=f569e144]: For such a small product, the benefits are numerous. If you've tried other drain protectors or hair strainers already, you know how much room there is for improvement in this space. TubShroom gets it right every time. See for yourself.
