                        - generic [ref=e1505]: I really liked the product. But the advertisement shown on the site seems so flawless. Well, I never had a near flawless scenario. Mine blocked all the way to the top (not because of the overgrowth on my body) but the soap lather that was used the previous day. The lather that stuck was hard and dry. So when I use the shower the next day, it gets clogged until the lather softens to make way for the water with next coat of lather adding on to it. But apart form this, I have used the other products that had the cover for the hair. But non as effective as this one. Good product.. Keep it up. Btw, I use a dove soap for men with the head and shoulders shampoo combo.
