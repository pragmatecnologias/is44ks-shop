                            - img [ref=f569e44]
                            - generic [ref=f569e50]: TubShroom® (Blue) Revolutionary Hair Catcher That Prevents Clogged Tub Drains
                          - generic [ref=f569e51]:
                            - img [ref=f569e54]
                            - generic [ref=f569e89]:
                              - strong [ref=f569e91]: TubShroom - A Revolution in Drain Protection
                              - generic [ref=f569e95]:
                                - paragraph [ref=f569e96]: We face a myriad of challenges each and every day. Cleaning clogged drains, thankfully, no longer has to be one of them--thanks to the TubShroom. TubShroom is a bathtub hair stopper that fits snug inside your shower tub drain, effortlessly gathering each and every hair that tries to make its way down your vulnerable drain. You can rest easy knowing that TubShroom works great for all kinds of hair-- human and pet alike.
                                - list [ref=f569e97]:
                                  - listitem [ref=f569e98]: Unlike regular plugs that go over the drain, TubShroom fits inside, neatly collecting hair around it.
                                  - listitem [ref=f569e99]: When it's time to cleanup, simply wipe TubShroom off and GO! No harsh chemicals, no more tangled messes.
                                  - listitem [ref=f569e100]: Our bathtub drain strainer fits any standard tub drain and is to catch every hair, every time.
                                  - listitem [ref=f569e101]: A single plumber visit can cost hundreds. Drain snakes and liquid drain cleaners are a hassle to use and aren’t always effective
                                  - listitem [ref=f569e102]: TubShroom has been honored as a 2018 KBB Product Innovator Award Winner in the home and bath category.
                                  - listitem [ref=f569e103]: Over five million drains are now protected by the Shroom patented design.
                                  - listitem [ref=f569e104]: Fits any standard 1.5 to 1.75 inch wide shower tub drain.
