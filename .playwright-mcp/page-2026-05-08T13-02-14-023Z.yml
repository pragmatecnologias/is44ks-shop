                      - text: Verified Purchase
                    - generic [ref=e2126]: This brush is great for cleaning inside your disposal area. I hate when you occasionally get that dreaded odor coming up from your sink. You know it’s time for some serious cleaning. I just run hot water, run my disposal for about 10-15 seconds. Afterwards (make sure you turn your disposal off), turn off the water, take some dish detergent and squeeze a little on the head of the brush, and start scrubbing inside your disposal area. I make sure I scrub the sides of the drain opening really well and continue throughout the area. Afterwards, run your hot water again, insuring all the foam rinses away. Viola! Clean garbage disposal area. This brush does do a good job however the wire stem does tend to bend and get a little misshaped. This would definitely be a 5 star product if that wire was a bit stronger. Nonetheless I would still recommend this as it does the job.
