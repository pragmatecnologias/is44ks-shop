                            - generic [ref=f798e33]: The 2.5-inch (63.5mm) air switch button for kitchen garbage disposal is suitable for stainless steel sink countertops and easy to install. It’s compatible with most garbage disposal brands (≤2HP), offering powerful support for a cleaner kitchen.
                          - generic [ref=f798e34]:
