                            - generic [ref=f798e40]: We offer a range of stylish button options, including Brushed Nickel, Brushed Gold, Chrome-Plated, and Brushed Silver, to suit different kitchen styles. Before ordering, please confirm your countertop’s thickness to choose the right switch for a proper fit.
                          - img [ref=f798e42]
                          - generic [ref=f798e43]:
                            - paragraph [ref=f798e44]:
                              - strong [ref=f798e45]: Features & Details
                            - list [ref=f798e46]:
                              - listitem [ref=f798e47]: "Wide Compatibility: This VEVOR garbage disposal air switch kit fits standard sink hole diameters of 1.25–1.38 inch / 31.75–35.1 mm. The air switch button is 2.5 inch / 63.5 mm long, suitable for stainless steel sink countertops and compatible with most garbage disposal brands (≤2HP)"
                            - list [ref=f798e48]:
                              - listitem [ref=f798e49]: "Durable & Safe: The cover of the garbage disposal air switch button is made of waterproof stainless steel with a brushed silver finish, resistant to rust and wear. It’s responsive to press - gently press to turn on the garbage disposal, and press again to turn it off"
                            - list [ref=f798e50]:
                              - listitem [ref=f798e51]: "More Enhanced Designs: Our air switch kit for waste disposer features a screw thread design—strong and not easy to fall off; thick internal silicone ensures a more flexible press, and the coil spring provides enhanced elasticity. Comes with an extended 4.92 ft / 1.5 m air tube for easy installation"
                            - list [ref=f798e52]:
                              - listitem [ref=f798e53]: "Easy Installation: 1. Mount the push button through a standard sink hole (1.25–1.38 inch diameter). 2. Attach air tubing between push button and power module tightly. 3. Plug the power module into a dedicated grounded 110-130V outlet that is continuously energized. 4. Connect power module and disposer"
                            - list [ref=f798e54]:
                              - listitem [ref=f798e55]: "Friendly Reminder: Before ordering, please confirm your countertop’s thickness to choose the right switch for a proper fit. In most cases, SHORT 2.5-INCH is for stainless steel sink tops and LONG 3.5-INCH is for thick countertop like granite, marble, quartz"
