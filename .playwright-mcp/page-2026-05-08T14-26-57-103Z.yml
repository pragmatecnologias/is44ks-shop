                      - generic [ref=f648e2]:
                        - text: Track-cleaning brushes that reach where others can't. Over time, dirt, grit, and even soap scum can gum up the works, making it tough to operate any type of sliding door. This set of two Track Cleaning Brushes reach where you can't to get tracks clean and even make doors easier to open. Track Cleaning Brushes are specially engineered to deep clean tracks on sliding doors, sliding windows and sliding shower doors. The secret is a two-part system that picks up dirt, grime, and soap-scum from even the tightest nooks and crannies. First, the wide brush eliminates particles over the length of the track. Then, the angled brush reaches into corners for a spotless finish. Set of two. Wide brush 8" x 4 1/2", angled brush 10".
                        - text: • KEEP YOUR DOORS SLIDING SMOOTHLY - Specially designed two-brush system keeps your door tracks sparkling clean and debris-free.
                        - text: • SAVE MONEY ON REPAIRS - Great way to extend the life of heavily used sliding doors. Brushes keep damaging dust and particles from the ball bearings.
                        - text: • TWO-BRUSH SET - Large brush removes heavy dust and grime, and a smaller, angled brush gets rid of fine dust particles.
                        - text: • MADE FOR YOUR DOOR TRACK - Handle and brush apparatus fit right into sliding-door tracks for a quick and easy cleaning.
                        - text: • EASY TO STORE- Keep them handy in your closet or tools space. Wide brush measures 8" long, the angled 10".
