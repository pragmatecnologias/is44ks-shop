services:
  db:
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resellos"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_DB: resellos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/resellos
      - LLM_PROVIDER=${LLM_PROVIDER:-minimax}
      - TEXT_LLM_PROVIDER=${TEXT_LLM_PROVIDER:-minimax}
      - TEXT_LLM_MODEL=${TEXT_LLM_MODEL:-MiniMax-Text-01}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-Text-01}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - VISION_LLM_PROVIDER=${VISION_LLM_PROVIDER:-qwen_vl}
      - VISION_LLM_BASE_URL=${VISION_LLM_BASE_URL:-http://localhost:8001/v1}
      - VISION_LLM_MODEL=${VISION_LLM_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
      - VISION_LLM_TIMEOUT_SECONDS=${VISION_LLM_TIMEOUT_SECONDS:-120}
      - VISION_LLM_API_KEY=${VISION_LLM_API_KEY:-}
      - VISION_MAX_IMAGE_MB=${VISION_MAX_IMAGE_MB:-8}
      - DATAFORSEO_ENABLED=${DATAFORSEO_ENABLED:-false}
      - DATAFORSEO_LOGIN=${DATAFORSEO_LOGIN:-}
      - DATAFORSEO_PASSWORD=${DATAFORSEO_PASSWORD:-}
      - DATAFORSEO_QUEUE=${DATAFORSEO_QUEUE:-standard}
      - DATAFORSEO_LOCATION_CODE=${DATAFORSEO_LOCATION_CODE:-2840}
      - DATAFORSEO_LANGUAGE_CODE=${DATAFORSEO_LANGUAGE_CODE:-en}
      - DATAFORSEO_MAX_RESULTS_PER_QUERY=${DATAFORSEO_MAX_RESULTS_PER_QUERY:-20}
      - DATAFORSEO_MAX_QUERIES_PER_IDEA=${DATAFORSEO_MAX_QUERIES_PER_IDEA:-3}
      - DATAFORSEO_CACHE_DAYS=${DATAFORSEO_CACHE_DAYS:-14}
      - DATAFORSEO_MONTHLY_BUDGET_USD=${DATAFORSEO_MONTHLY_BUDGET_USD:-25.0}
      - DEFAULT_MARKETPLACE_FEE_PERCENT=${DEFAULT_MARKETPLACE_FEE_PERCENT:-13.0}
      - DEFAULT_PACKAGING_COST=${DEFAULT_PACKAGING_COST:-0.50}
      - DEFAULT_OUTBOUND_SHIPPING=${DEFAULT_OUTBOUND_SHIPPING:-4.50}
      - DEFAULT_RETURN_ALLOWANCE=${DEFAULT_RETURN_ALLOWANCE:-0.50}
      - MIN_ACCEPTABLE_PROFIT=${MIN_ACCEPTABLE_PROFIT:-3.0}
      - MIN_ACCEPTABLE_MARGIN=${MIN_ACCEPTABLE_MARGIN:-20.0}
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
