services:
  db:
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resellos"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_DB: resellos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/resellos
      - LLM_PROVIDER=${LLM_PROVIDER:-minimax}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-Text-01}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEFAULT_MARKETPLACE_FEE_PERCENT=${DEFAULT_MARKETPLACE_FEE_PERCENT:-13.0}
      - DEFAULT_PACKAGING_COST=${DEFAULT_PACKAGING_COST:-0.50}
      - DEFAULT_RETURN_ALLOWANCE=${DEFAULT_RETURN_ALLOWANCE:-0.50}
      - MIN_ACCEPTABLE_PROFIT=${MIN_ACCEPTABLE_PROFIT:-3.0}
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
